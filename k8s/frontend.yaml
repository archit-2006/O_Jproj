apiVersion: apps/v1
kind: Deployment
metadata:
  name: oj-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oj-frontend
  template:
    metadata:
      labels:
        app: oj-frontend
    spec:
      containers:
      - name: oj-frontend
        image: oj-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: oj-frontend-service
spec:
  type: NodePort
  selector:
    app: oj-frontend
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080
